<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#fafafa;}


header{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background:rgba(0,0,0,0.6);
  z-index:1000;
}

.logo{
  color:#fff;
  font-size:24px;
  font-family:'Playfair Display';
}

nav{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

nav a{
  color:#fff;
  margin:0 15px;
  text-decoration:none;
}

.social{
  display:flex;
  gap:15px;
}

.social a{
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.2);
  color:#fff;
}

.hero{
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:#fff;
  text-align:center;
}


.image-bottom{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  top:0;
  left:0;
  z-index:1;
}


.image-top{
  position:absolute;
  width:100%;
  bottom:0;
  left:0;
  z-index:2;
}


.hero h1{
  position:relative;
  z-index:3;
  font-size:80px;
  font-family:'Playfair Display';
}

.map iframe{
  width:100%;
  height:400px;
  filter:grayscale(100%) contrast(1.2);
}


.contact-wrap{
  margin-top:-120px;
  display:flex;
  justify-content:center;
}

.contact-card{
  background:#fff;
  width:80%;
  padding:50px;
  display:flex;
  justify-content:space-between;
  box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

.contact-card form{
  width:45%;
}

.contact-card input,
.contact-card textarea{
  width:100%;
  border:none;
  border-bottom:1px solid #ccc;
  margin:20px 0;
  padding:10px;
}

.contact-card button{
  margin-top:20px;
  padding:12px 30px;
  border:1px solid #000;
  background:none;
  cursor:pointer;
}

.contact-info{
  width:45%;
}

.contact-info h2{
  font-size:40px;
  font-family:'Playfair Display';
}

.contact-info h2 span{
  font-style:italic;
}

.contact-info p{
  margin-top:10px;
  color:#777;
}


.gallery-section{
  padding:100px 8%;
  text-align:center;
}

.gallery-title{
  font-size:60px;
  font-family:'Playfair Display';
  margin-bottom:40px;
}

.gallery{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.gallery img{
  width:23%;
  height:250px;
  object-fit:cover;
  transition:0.4s;
}

.gallery img:hover{
  transform:scale(1.05);
}


.footer{
  position:relative;
  background:url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTTlHUXsQVXE8I3t49VKWe6kwjLytq0utL15g&s') center/cover no-repeat;
  height:350px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
}

.footer-overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.footer-content{
  position:relative;
  z-index:2;
}

.footer-logo{
  font-family:'Playfair Display';
  font-size:32px;
  margin-bottom:15px;
}

.footer-social{
  display:flex;
  justify-content:center;
  gap:15px;
}

.footer-social a{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#fff;
  color:#333;
  display:flex;
  align-items:center;
  justify-content:center;
}


@media(max-width:768px){
  .contact-card{
    flex-direction:column;
  }

  .contact-card form,
  .contact-info{
    width:100%;
  }

  .gallery img{
    width:100%;
  }
}

</style>
</head>

<body>

<header>
  <div class="logo">bridgé</div>

  <nav>
    <a href="index.html">HOME</a>
    <a href="team.html">TEAM</a>
    <a href="about.html">ABOUT</a>
    <a href="contact.html">CONTACT</a>
  </nav>

  <div class="social">
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-twitter"></i></a>
  </div>
</header>

<section class="hero">

  <!-- Background Image -->
  <img src="https://bridge248.qodeinteractive.com/wp-content/uploads/2018/06/slider-background.jpg" 
       class="image-bottom">

  <!-- Top Graphic -->
  <img src="https://bridge248.qodeinteractive.com/wp-content/uploads/2018/06/slider-graphic-3.png" 
       class="image-top">

  <h1>Contact</h1>
</section>


<section class="map">
  <iframe src="https://maps.google.com/maps?q=sydney&t=&z=12&output=embed"></iframe>
</section>


<section class="contact-wrap">
  <div class="contact-card">

    <form>
      <input type="text" placeholder="Name*">
      <input type="email" placeholder="Email*">
      <textarea placeholder="Message"></textarea>
      <button>SEND</button>
    </form>

    <div class="contact-info">
      <h2><span>Visit</span> our shops</h2>
      <p>Lorem ipsum dolor sit amet.</p>
      <p>09:00–19h Monday – Friday</p>
      <p>75-11 Jewett Ave Jersey City, NJ</p>
      <p>+ (1) 555 678 786</p>
    </div>

  </div>
</section>


<section class="gallery-section">
  <h2 class="gallery-title">Our Moments</h2>

  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1587135991058-8816b028691f">
    <img src="https://images.unsplash.com/photo-1511381939415-e44015466834">
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
    <img src="https://images.unsplash.com/photo-1606312619070-d48b4c652a52">
  </div>
</section>


<footer class="footer">
  <div class="footer-overlay"></div>

  <div class="footer-content">
    <h2 class="footer-logo">bridgé</h2>

    <p>
      © Copyright Qode Interactive – All Rights Reserved <br>
      Proudly Made For You.
    </p>

    <div class="footer-social">
      <a href="#"><i class="fab fa-facebook-f"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
    </div>
  </div>
</footer>

</body>
</html>
